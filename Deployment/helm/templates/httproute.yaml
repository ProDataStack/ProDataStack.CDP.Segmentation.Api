apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: "{{ .Values.serviceName }}-route"
  namespace: cdp
spec:
  parentRefs:
  - name: prodatastack-gateway
    namespace: envoy-gateway-system
  hostnames:
  {{- range .Values.hostNames }}
  - {{ . }}
  {{- end }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ .Values.serviceName }}
      port: 80
