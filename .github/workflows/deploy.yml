name: Deploy CDP Segmentation API

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - both
          - testing
          - production

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --build-arg GITHUB_TOKEN=${{ secrets.NUGET_TOKEN }} \
            -t cdp.segmentation.api:${{ github.run_number }} \
            -f ProDataStack.CDP.Segmentation.Api/Dockerfile \
            .

      - name: Save Docker image
        run: |
          docker save cdp.segmentation.api:${{ github.run_number }} -o cdp.segmentation.api.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: cdp.segmentation.api.tar
          retention-days: 1

  deploy-testing:
    name: Deploy to Testing
    needs: build
    runs-on: ubuntu-latest
    environment: Testing
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.environment == 'testing' || inputs.environment == 'both'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set environment variables
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV

      - name: Add secrets to Key Vault
        run: |
          VAULT_NAME="cdp-seg-api-test"
          RESOURCE_GROUP="cdp-segmentation-api"

          # Get runner's public IP
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"

          # Add runner IP to Key Vault firewall
          echo "Adding runner IP to Key Vault firewall..."
          az keyvault network-rule add --name "$VAULT_NAME" --resource-group "$RESOURCE_GROUP" --ip-address "$RUNNER_IP"

          # Wait for firewall rule to propagate
          echo "Waiting for firewall rule to propagate..."
          MAX_ATTEMPTS=30
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if az keyvault network-rule list --name "$VAULT_NAME" --resource-group "$RESOURCE_GROUP" --query "ipRules[?contains(value, '$RUNNER_IP')].value" -o tsv | grep -q "$RUNNER_IP"; then
              echo "Firewall rule confirmed active"
              break
            fi
            echo "Waiting for rule to propagate (attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS)..."
            sleep 2
            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "Warning: Firewall rule may not have propagated, continuing anyway..."
          fi

          # Set secrets
          az keyvault secret set \
            --name TenantCatalogDatabaseConnection \
            --vault-name "$VAULT_NAME" \
            --value "Server=${{ vars.DATABASE_SERVER }};Database=${{ vars.APPLICATION_DATABASE }};Authentication=Active Directory Default;TrustServerCertificate=False;Encrypt=True;Connect Timeout=120;"

          az keyvault secret set --name ClerkSecretKey --vault-name "$VAULT_NAME" --value "${{ secrets.CLERK_SECRET_KEY }}"
          az keyvault secret set --name ClerkWebhookSecret --vault-name "$VAULT_NAME" --value "${{ secrets.CLERK_WEBHOOK_SECRET }}"

          # Remove runner IP from firewall
          echo "Removing runner IP from Key Vault firewall..."
          az keyvault network-rule remove --name "$VAULT_NAME" --resource-group "$RESOURCE_GROUP" --ip-address "$RUNNER_IP"

      - name: Load Docker image
        run: docker load -i cdp.segmentation.api.tar

      - name: Add runner IP to ACR network rules
        run: |
          PROD_SUB="${{ vars.PRODUCTION_SUBSCRIPTION_ID }}"
          ACR_NAME="pdscontainerregistryproduction"
          RUNNER_IP=$(curl -s https://api.ipify.org)
          az acr network-rule add --name "$ACR_NAME" --ip-address "$RUNNER_IP" --subscription "$PROD_SUB"
          sleep 30

      - name: Log in to Azure Container Registry
        run: |
          PROD_SUB="${{ vars.PRODUCTION_SUBSCRIPTION_ID }}"
          for i in 1 2 3 4 5; do
            az acr login --name pdscontainerregistryproduction --subscription "$PROD_SUB" && break
            echo "ACR login attempt $i failed, retrying in 15 seconds..."
            sleep 15
          done

      - name: Tag and push Docker image
        run: |
          docker tag cdp.segmentation.api:${{ github.run_number }} pdscontainerregistryproduction.azurecr.io/cdp.segmentation.api:${{ github.run_number }}
          for i in 1 2 3 4 5; do
            docker push pdscontainerregistryproduction.azurecr.io/cdp.segmentation.api:${{ github.run_number }} && break
            echo "Push attempt $i failed, retrying in 15 seconds..."
            sleep 15
          done

      - name: Remove runner IP from ACR network rules
        if: always()
        run: |
          PROD_SUB="${{ vars.PRODUCTION_SUBSCRIPTION_ID }}"
          ACR_NAME="pdscontainerregistryproduction"
          RUNNER_IP=$(curl -s https://api.ipify.org)
          az acr network-rule remove --name "$ACR_NAME" --ip-address "$RUNNER_IP" --subscription "$PROD_SUB" || true

      - name: Set AKS context
        run: |
          az aks get-credentials \
            --resource-group prodatastack_shared \
            --name prodatastack-cluster \
            --overwrite-existing

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.13.0'

      - name: Replace tokens in Helm values
        run: |
          sed -i "s|__ContainerRegistry__|pdscontainerregistryproduction.azurecr.io|g" Deployment/helm/values.yaml
          sed -i "s|__repository__|cdp.segmentation.api|g" Deployment/helm/values.yaml
          sed -i "s|__tag__|${{ github.run_number }}|g" Deployment/helm/values.yaml
          sed -i "s|__AppName__|cdp-segmentation-api|g" Deployment/helm/values.yaml
          sed -i "s|__Environment__|testing|g" Deployment/helm/values.yaml
          sed -i "s|__ServiceName__|cdp-segmentation-api-service|g" Deployment/helm/values.yaml
          sed -i "s|__HostName__|cdp-segmentation-api.testing.pdsnextgen.com|g" Deployment/helm/values.yaml
          sed -i "s|__KeyVaultName__|cdp-seg-api-test|g" Deployment/helm/values.yaml
          sed -i "s|__TenantId__|${{ secrets.AZURE_TENANT_ID }}|g" Deployment/helm/values.yaml
          sed -i "s|__ServicePrincipalClientId__|${{ secrets.AZURE_DEPLOYMENT_CLIENT_ID}}|g" Deployment/helm/values.yaml
          sed -i "s|__AzureServiceBusConnectionString__|${{ secrets.AZURE_SERVICE_BUS_CONNECTION_STRING }}|g" Deployment/helm/values.yaml
          sed -i "s|__K8sReplicaCount__|1|g" Deployment/helm/values.yaml
          sed -i "s|__ApplicationInsightsConnectionString__|${{ secrets.APPLICATION_INSIGHTS_CONNECTION_STRING }}|g" Deployment/helm/values.yaml
          sed -i "s|__AuthenticationMode__|${{ vars.AUTHENTICATION_MODE }}|g" Deployment/helm/values.yaml
          sed -i "s|__ClerkPublishableKey__|${{ vars.CLERK_PUBLISHABLE_KEY }}|g" Deployment/helm/values.yaml
          sed -i "s|__ClerkIssuer__|${{ vars.CLERK_ISSUER }}|g" Deployment/helm/values.yaml
          sed -i "s|__ClerkJwksUrl__|${{ vars.CLERK_JWKS_URL }}|g" Deployment/helm/values.yaml
          sed -i "s|__ClerkAuthorizedParty__|${{ vars.CLERK_AUTHORIZED_PARTY }}|g" Deployment/helm/values.yaml
          sed -i "s|__K8sResourceRequestsMemory__|96Mi|g" Deployment/helm/values.yaml
          sed -i "s|__K8sResourceRequestsCpu__|10m|g" Deployment/helm/values.yaml
          sed -i "s|__K8sResourceLimitsMemory__|256Mi|g" Deployment/helm/values.yaml
          sed -i "s|__K8sResourceLimitsCpu__|200m|g" Deployment/helm/values.yaml

      - name: Deploy with Helm
        run: |
          helm upgrade --install cdp-segmentation-api-testing-release \
            ./Deployment/helm \
            --namespace cdp-testing \
            --create-namespace \
            --wait \
            --timeout 10m

      - name: Get pod name on failure
        if: failure()
        id: get-pod
        run: |
          POD_NAME=$(kubectl get pods -n cdp-testing -l app=cdp-segmentation-api -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          echo "pod_name=$POD_NAME" >> $GITHUB_OUTPUT
          echo "Pod name: $POD_NAME"

      - name: Get pod logs on failure
        if: failure() && steps.get-pod.outputs.pod_name != ''
        run: |
          echo "=== Pod Logs ==="
          kubectl logs ${{ steps.get-pod.outputs.pod_name }} -n cdp-testing --tail=100 || echo "Failed to retrieve logs"

      - name: Describe pod on failure
        if: failure() && steps.get-pod.outputs.pod_name != ''
        run: |
          echo "=== Pod Description ==="
          kubectl describe pod ${{ steps.get-pod.outputs.pod_name }} -n cdp-testing || echo "Failed to describe pod"

      - name: Get all pods status on failure
        if: failure()
        run: |
          echo "=== All Pods Status ==="
          kubectl get pods -n cdp-testing -l app=cdp-segmentation-api || echo "Failed to get pods status"

  deploy-production:
    name: Deploy to Production
    needs: [build, deploy-testing]
    runs-on: ubuntu-latest
    environment: Production
    if: |
      always() &&
      needs.build.result == 'success' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'production') ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'both' && needs.deploy-testing.result == 'success')
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set environment variables
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV
          echo "ARM_USE_OIDC=true" >> $GITHUB_ENV

      - name: Add secrets to Key Vault
        run: |
          VAULT_NAME="cdp-seg-api-prod"
          RESOURCE_GROUP="cdp-segmentation-api"

          # Get runner's public IP
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"

          # Add runner IP to Key Vault firewall
          echo "Adding runner IP to Key Vault firewall..."
          az keyvault network-rule add --name "$VAULT_NAME" --resource-group "$RESOURCE_GROUP" --ip-address "$RUNNER_IP"

          # Wait for firewall rule to propagate
          echo "Waiting for firewall rule to propagate..."
          MAX_ATTEMPTS=30
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if az keyvault network-rule list --name "$VAULT_NAME" --resource-group "$RESOURCE_GROUP" --query "ipRules[?contains(value, '$RUNNER_IP')].value" -o tsv | grep -q "$RUNNER_IP"; then
              echo "Firewall rule confirmed active"
              break
            fi
            echo "Waiting for rule to propagate (attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS)..."
            sleep 2
            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "Warning: Firewall rule may not have propagated, continuing anyway..."
          fi

          # Set secrets
          az keyvault secret set \
            --name TenantCatalogDatabaseConnection \
            --vault-name "$VAULT_NAME" \
            --value "Server=${{ vars.DATABASE_SERVER }};Database=${{ vars.APPLICATION_DATABASE }};Authentication=Active Directory Default;TrustServerCertificate=False;Encrypt=True;Connect Timeout=120;"

          az keyvault secret set --name ClerkSecretKey --vault-name "$VAULT_NAME" --value "${{ secrets.CLERK_SECRET_KEY }}"
          az keyvault secret set --name ClerkWebhookSecret --vault-name "$VAULT_NAME" --value "${{ secrets.CLERK_WEBHOOK_SECRET }}"

          # Remove runner IP from firewall
          echo "Removing runner IP from Key Vault firewall..."
          az keyvault network-rule remove --name "$VAULT_NAME" --resource-group "$RESOURCE_GROUP" --ip-address "$RUNNER_IP"

      - name: Load Docker image
        run: docker load -i cdp.segmentation.api.tar

      - name: Add runner IP to ACR network rules
        run: |
          ACR_NAME="${{ vars.CONTAINER_REGISTRY_NAME }}"

          # Get runner's public IP
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"

          # Add runner IP to ACR firewall
          echo "Adding runner IP to ACR firewall..."
          az acr network-rule add --name "$ACR_NAME" --ip-address "$RUNNER_IP"

          # Wait for firewall rule to propagate
          echo "Waiting for firewall rule to propagate..."
          sleep 10

      - name: Log in to Azure Container Registry
        run: |
          for i in 1 2 3 4 5; do
            az acr login --name ${{ vars.CONTAINER_REGISTRY_NAME }} && break
            echo "ACR login attempt $i failed, retrying in 15 seconds..."
            sleep 15
          done

      - name: Tag and push Docker image
        run: |
          docker tag cdp.segmentation.api:${{ github.run_number }} ${{ vars.CONTAINER_REGISTRY }}/cdp.segmentation.api:${{ github.run_number }}
          docker push ${{ vars.CONTAINER_REGISTRY }}/cdp.segmentation.api:${{ github.run_number }}

      - name: Remove runner IP from ACR network rules
        if: always()
        run: |
          ACR_NAME="${{ vars.CONTAINER_REGISTRY_NAME }}"
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Removing runner IP from ACR firewall..."
          az acr network-rule remove --name "$ACR_NAME" --ip-address "$RUNNER_IP" || echo "Failed to remove IP rule, it may have been already removed"

      - name: Set AKS context
        run: |
          az aks get-credentials \
            --resource-group prodatastack_shared \
            --name prodatastack-cluster \
            --overwrite-existing

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.13.0'

      - name: Replace tokens in Helm values
        run: |
          sed -i "s|__ContainerRegistry__|${{ vars.CONTAINER_REGISTRY }}|g" Deployment/helm/values.yaml
          sed -i "s|__repository__|cdp.segmentation.api|g" Deployment/helm/values.yaml
          sed -i "s|__tag__|${{ github.run_number }}|g" Deployment/helm/values.yaml
          sed -i "s|__AppName__|cdp-segmentation-api|g" Deployment/helm/values.yaml
          sed -i "s|__Environment__|production|g" Deployment/helm/values.yaml
          sed -i "s|__ServiceName__|cdp-segmentation-api-service|g" Deployment/helm/values.yaml
          sed -i "s|__HostName__|cdp-segmentation-api.prodatastack.com|g" Deployment/helm/values.yaml
          sed -i "s|__KeyVaultName__|cdp-seg-api-prod|g" Deployment/helm/values.yaml
          sed -i "s|__TenantId__|${{ secrets.AZURE_TENANT_ID }}|g" Deployment/helm/values.yaml
          sed -i "s|__ServicePrincipalClientId__|${{ secrets.AZURE_DEPLOYMENT_CLIENT_ID}}|g" Deployment/helm/values.yaml
          sed -i "s|__AzureServiceBusConnectionString__|${{ secrets.AZURE_SERVICE_BUS_CONNECTION_STRING }}|g" Deployment/helm/values.yaml
          sed -i "s|__K8sReplicaCount__|1|g" Deployment/helm/values.yaml
          sed -i "s|__ApplicationInsightsConnectionString__|${{ secrets.APPLICATION_INSIGHTS_CONNECTION_STRING }}|g" Deployment/helm/values.yaml
          sed -i "s|__AuthenticationMode__|${{ vars.AUTHENTICATION_MODE }}|g" Deployment/helm/values.yaml
          sed -i "s|__ClerkPublishableKey__|${{ vars.CLERK_PUBLISHABLE_KEY }}|g" Deployment/helm/values.yaml
          sed -i "s|__ClerkIssuer__|${{ vars.CLERK_ISSUER }}|g" Deployment/helm/values.yaml
          sed -i "s|__ClerkJwksUrl__|${{ vars.CLERK_JWKS_URL }}|g" Deployment/helm/values.yaml
          sed -i "s|__ClerkAuthorizedParty__|${{ vars.CLERK_AUTHORIZED_PARTY }}|g" Deployment/helm/values.yaml
          sed -i "s|__K8sResourceRequestsMemory__|256Mi|g" Deployment/helm/values.yaml
          sed -i "s|__K8sResourceRequestsCpu__|50m|g" Deployment/helm/values.yaml
          sed -i "s|__K8sResourceLimitsMemory__|512Mi|g" Deployment/helm/values.yaml
          sed -i "s|__K8sResourceLimitsCpu__|500m|g" Deployment/helm/values.yaml

      - name: Deploy with Helm
        run: |
          helm upgrade --install cdp-segmentation-api-production-release \
            ./Deployment/helm \
            --namespace cdp-production \
            --create-namespace \
            --wait \
            --timeout 10m

      - name: Get pod name on failure
        if: failure()
        id: get-pod
        run: |
          POD_NAME=$(kubectl get pods -n cdp-production -l app=cdp-segmentation-api -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          echo "pod_name=$POD_NAME" >> $GITHUB_OUTPUT
          echo "Pod name: $POD_NAME"

      - name: Get pod logs on failure
        if: failure() && steps.get-pod.outputs.pod_name != ''
        run: |
          echo "=== Pod Logs ==="
          kubectl logs ${{ steps.get-pod.outputs.pod_name }} -n cdp-production --tail=100 || echo "Failed to retrieve logs"

      - name: Describe pod on failure
        if: failure() && steps.get-pod.outputs.pod_name != ''
        run: |
          echo "=== Pod Description ==="
          kubectl describe pod ${{ steps.get-pod.outputs.pod_name }} -n cdp-production || echo "Failed to describe pod"

      - name: Get all pods status on failure
        if: failure()
        run: |
          echo "=== All Pods Status ==="
          kubectl get pods -n cdp-production -l app=cdp-segmentation-api || echo "Failed to get pods status"
